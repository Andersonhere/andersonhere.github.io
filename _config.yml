# Jekyll Theme Yat — https://github.com/jeffreytse/jekyll-theme-yat
# 远程主题（GitHub Pages 兼容）：https://github.com/jeffreytse/jekyll-theme-yat#remote-theme-method-with-jekyll-remote-theme-plugin

remote_theme: "jeffreytse/jekyll-theme-yat"

plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate
  # 主题内置能力依赖 jekyll-spaceship（表格/MathJax/Mermaid 等），但不在 GitHub Pages 默认白名单。
  # 若需在线构建支持，请用 GitHub Actions 全量构建部署（见主题 README「GitHub Pages without limitation」）。

title: "Anderson's Blog"
email:
author: Anderson

copyright: "© {currentYear} {author}"

description: 总结与分享

# GitHub Pages 用户站根域名（jekyll-seo-tag、RSS、canonical 等依赖）
# 若为项目站（如 /WorkGuide/），请改为对应 url 并设置 baseurl: "/WorkGuide"
url: "https://andersonhere.github.io"
baseurl: ""
favicon: ""

repository: Andersonhere/WorkGuide

lang: zh-CN

yat:
  date_format: "%Y-%m-%d"

future: true

header_pages:
  - index.html
  - archives.html
  - categories.html
  - tags.html
  - about.md

github_username: Andersonhere
twitter_username:

# 头像（若主题未引用，可忽略；图片请放在 blog/images/... 下）
avatar: /images/homepage/7e58f9564691a8.png

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: "highlight"

sass:
  style: :compressed

permalink: /:title/

paginate: 10
paginate_path: "/page:num/"

exclude:
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - CNAME
  - jekyll-theme-yat-setup.md
