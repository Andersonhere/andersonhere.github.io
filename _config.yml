# Jekyll Theme Yat — https://github.com/jeffreytse/jekyll-theme-yat
# 远程主题（GitHub Pages 兼容）：https://github.com/jeffreytse/jekyll-theme-yat#remote-theme-method-with-jekyll-remote-theme-plugin

remote_theme: "jeffreytse/jekyll-theme-yat"

plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-spaceship

title: "Anderson's Blog"
email:
author: Anderson

copyright: "© {currentYear} {author}"

description: 总结与分享

# 本仓库：Andersonhere/andersonhere.github.io（用户站根路径）
url: "https://andersonhere.github.io"
baseurl: ""
favicon: ""

repository: Andersonhere/andersonhere.github.io

lang: zh-CN

yat:
  date_format: "%Y-%m-%d"

future: true

# 远程主题未为文章设置默认 layout；不写 layout 时文章不会走 post 布局，侧栏与正文样式会缺失。
# permalink 只能作用于 posts：若写在顶层，会改掉 categories/tags/archives 等页面的 URL，
# 侧栏仍指向 /categories.html → 整页 404。
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      permalink: "/:title/"

header_pages:
  - index.html
  - archives.html
  - categories.html
  - tags.html
  - about.md

github_username: Andersonhere
twitter_username:

# 头像（若主题未引用，可忽略；图片请放在 blog/images/... 下）
avatar: /images/homepage/7e58f9564691a8.png

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: "highlight"

sass:
  style: :compressed

paginate: 10
paginate_path: "/page:num/"

exclude:
  # CI 上 bundler-cache 会把 gem 装到 vendor/bundle；不排除时 Jekyll 会扫到 gem 内 site_template/_posts 的 .erb 模板并报错。
  - vendor
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - CNAME
  - jekyll-theme-yat-setup.md
